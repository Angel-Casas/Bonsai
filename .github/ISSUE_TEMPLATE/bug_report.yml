name: Bug Report
description: Report a bug or unexpected behavior in Bonsai
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        ## Privacy Reminder
        **Do NOT include your NanoGPT API key or private conversation content in this report.**

        Thank you for taking the time to report a bug. Please fill out the sections below to help us investigate.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of what the bug is.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
      placeholder: Describe what you expected...
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain your problem.
      placeholder: Drag and drop images here or paste from clipboard...
    validations:
      required: false

  - type: textarea
    id: debug-info
    attributes:
      label: Debug Info
      description: |
        Paste the output from Settings > Support > "Copy Debug Info" here.
        This helps us understand your environment.
      placeholder: |
        Bonsai Debug Info
        ==================
        App Version: ...
        ...
      render: text
    validations:
      required: false

  - type: checkboxes
    id: privacy-check
    attributes:
      label: Privacy Checklist
      description: Please confirm before submitting
      options:
        - label: I have NOT included my NanoGPT API key in this report
          required: true
        - label: I have NOT included private conversation content in this report
          required: true
